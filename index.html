<script>
    const questions = [
        { id: 1, text: "Putting a till in a cash stn that wasn't on the weekly sched." },
        { id: 2, text: "When ur closing out a cash stn that 2 or more leads have touched." },
        { id: 3, text: "What the game plan for closing is if ur deviating from the usual plan." },
        { id: 4, text: "If something goes awry." },
        { id: 5, text: "If RPPs are becoming disorganized." }
    ];

    // Sarcastic reasons for why they chose "No"
    const passiveAggressiveReasons = [
        "I prefer leaving mysteries for the next shift.",
        "I thought telepathy was implemented in the last company update.",
        "If I don't say it out loud, it didn't actually happen.",
        "Chaos keeps leadership on their toes.",
        "I wanted to see how long it takes for everything to collapse."
    ];

    // Ultra-reliable image links for doing the bare minimum
    const memes = [
        "https://images.unsplash.com/photo-1531070836166-440d4bd270b4?w=500&auto=format&fit=crop&q=60", // Golden Star sticker ("You Tried")
        "https://images.unsplash.com/photo-1599508704512-2f19efd1e35f?w=500&auto=format&fit=crop&q=60", // Giant 3D Question Mark
        "https://images.unsplash.com/photo-1516624683217-bf02fc6b6b7c?w=500&auto=format&fit=crop&q=60"  // Confetti explosion for the bare minimum
    ];

    let currentStep = 0;

    function renderQuestion() {
        if (currentStep >= questions.length) {
            showResults();
            return;
        }

        document.getElementById('quiz-progress').innerText = `Question ${currentStep + 1} of ${questions.length}`;
        
        const q = questions[currentStep];
        const randomMeme = memes[Math.floor(Math.random() * memes.length)];
        
        const dropdownOptions = passiveAggressiveReasons
            .map(reason => `<option value="${reason}">${reason}</option>`).join('');

        const html = `
            <div class="question-card active">
                <div class="quiz-header" style="border:none; font-size:1.4rem; color:#333;">Should this be communicated?</div>
                <div class="scenario">"${q.text}"</div>
                
                <div class="btn-group" id="actions-${q.id}">
                    <button class="btn-yes" onclick="handleAnswer(${q.id}, true)">YES</button>
                    <button class="btn-no" onclick="handleAnswer(${q.id}, false)">NO</button>
                </div>

                <div class="feedback success" id="success-${q.id}">
                    <strong>Congratulations!</strong> You possess the rare and mystical skill known as "basic communication." 🌟
                    <br><br>
                    <img src="${randomMeme}" alt="Sarcastic praise" style="max-height: 250px; width: 100%; object-fit: cover; border-radius: 8px;">
                </div>

                <div class="sub-question" id="sub-${q.id}">
                    <label><strong>Groundbreaking choice. Why exactly shouldn't this be communicated?</strong></label>
                    <select id="select-${q.id}" onchange="revealNextBtn(${q.id})">
                        <option value="" disabled selected>Select your excuse...</option>
                        ${dropdownOptions}
                    </select>
                </div>

                <button class="next-btn" id="next-${q.id}" onclick="nextQuestion()">Continue to next obvious reality →</button>
            </div>
        `;
        
        document.getElementById('quiz-body').innerHTML = html;
    }

    function handleAnswer(id, isYes) {
        const buttons = document.querySelectorAll(`#actions-${id} button`);
        buttons.forEach(b => b.disabled = true);

        if (isYes) {
            document.getElementById(`success-${id}`).style.display = 'block';
            document.getElementById(`next-${id}`).style.display = 'block';
        } else {
            document.getElementById(`sub-${id}`).style.display = 'block';
        }
    }

    function revealNextBtn(id) {
        document.getElementById(`next-${id}`).style.display = 'block';
    }

    function nextQuestion() {
        currentStep++;
        renderQuestion();
    }

    function showResults() {
        document.getElementById('quiz-progress').style.display = 'none';
        document.getElementById('quiz-body').style.display = 'none';
        document.getElementById('results-card').style.display = 'block';
    }

    renderQuestion();
</script>
